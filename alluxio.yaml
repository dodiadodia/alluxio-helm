image: public.ecr.aws/m3q8r0k4/dodia/alluxio-enterprise
imageTag: AI-3.9-16.0.0-3-MSFT 
properties:
  alluxio.worker.oci.registry.enabled: "true" # Enable or disable OCI acceleration
  alluxio.worker.http.server.port: "28080" # Worker OCI port
  alluxio.worker.oci.registry.upstream.allowlist: "alluxio.azurecr.io" # Customer-modified: allowed ACR domains for proxying, comma-separated
  alluxio.worker.oci.registry.persistent.cache.enabled: "true" # Persistent cache, survives restarts

  # === Cache TTL (Optional, the following are recommended default values for production) ===
  alluxio.worker.oci.registry.cache.authz.ttl: "60sec" # Cache for successful authorization
  alluxio.worker.oci.registry.cache.authz.negative.ttl: "15sec" # Cache for failed authorization
  alluxio.worker.oci.registry.cache.binding.ttl: "10min" # Repo binding + blob metadata
  alluxio.worker.oci.registry.cache.tag.soft.ttl: "30sec" # Tag soft expiration (background refresh upon expiry)
  alluxio.worker.oci.registry.cache.tag.hard.ttl: "5min" # Tag hard expiration (forces re-pull upon expiry)

user: 0
group: 0
fsGroup: 0

hostNetwork: true

prometheus:
  nodeSelector:
    alluxio.io/worker: enabled
  tolerations:
    - operator: Exists
  image: public.ecr.aws/m3q8r0k4/dodia/prometheus
  imageTag: v2.52.0

grafana:
  nodeSelector:
    alluxio.io/worker: enabled
  tolerations:
    - operator: Exists
  ports:
    web: 3000
    hostPort: 3000
  image: public.ecr.aws/m3q8r0k4/dodia/grafana
  imageTag: 11.1.0-ubuntu

etcd:
  nodeSelector:
    alluxio.io/worker: enabled
  tolerations:
    - operator: Exists
  replicaCount: 1
  image:
    registry: public.ecr.aws/m3q8r0k4
    repository: dodia/etcd
    tag: 3.5.9-debian-11-r24
  volumePermissions:
    image:
      registry: public.ecr.aws/m3q8r0k4
      repository: dodia/os-shell
      tag: 11-debian-11-r2
  persistence:
    enabled: true
    storageClass: managed-csi
    size: 50Gi

coordinator:
  nodeSelector:
    alluxio.io/worker: enabled
  tolerations:
    - operator: Exists
  metastore:
    hostPath: /mnt/alluxio/master/meta
  jvmOptions:
    - -Xmx16g
    - -Xms4g
    - -XX:MaxDirectMemorySize=8g
  resources:
    limits:
      cpu: "8"
      memory: "24Gi"
    requests:
      cpu: "2"
      memory: "4Gi"

worker:
  useExternalId: false
  systemInfo:
    type: hostPath
    hostPath: /mnt/alluxio/system-info
  log:
    type: hostPath
    hostPath: /mnt/alluxio/logs/worker
  metastore:
    type: hostPath
    hostPath: /mnt/alluxio/pagestore/meta

workerGroups:
  - worker:
      nodeSelector:
        alluxio.io/worker: enabled
      tolerations:
        - operator: Exists
      count: 2
      pagestore:
        hostPath: /mnt/alluxio/pagestore/data,/mnt/disk2/pagestore/data,/mnt/disk3/pagestore/data
        size: 350Gi,350Gi,350Gi
      jvmOptions:
        - -Xmx24g
        - -Xms8g
        - -XX:MaxDirectMemorySize=16g
      resources:
        limits:
          cpu: "12"
          memory: "42Gi"
        requests:
          cpu: "4"
          memory: "8Gi"

fuse:
  type: none

oci:
  image: public.ecr.aws/m3q8r0k4/dodia/alluxio-oci-proxy
  imageTag: v1.0
  nodeSelector:
    alluxio.io/oci: "enabled"
  upstreamRegistry: alluxio.azurecr.io
  containerdSetup:
    image: public.ecr.aws/m3q8r0k4/dodia/alluxio-containerd-action
    imageTag: v0.1
