image: public.ecr.aws/m3q8r0k4/dodia/alluxio-enterprise
imageTag: 3.x-17.0.0-oci-fix10
properties:
  alluxio.license: ""
  alluxio.worker.oci.registry.enabled: "true" # OCI 加速总开关
  alluxio.worker.http.server.port: "28080" # Worker OCI 服务端口
  alluxio.worker.oci.registry.upstream.allowlist: "alluxio.azurecr.io" # 客户修改：允许代理的 ACR 域名，逗号分隔
  alluxio.worker.oci.registry.persistent.cache.enabled: "true" # 持久缓存，重启后不丢失

  # === 缓存 TTL（可选，以下为生产推荐默认值） ===
  alluxio.worker.oci.registry.cache.authz.ttl: "60sec" # 鉴权成功缓存
  alluxio.worker.oci.registry.cache.authz.negative.ttl: "15sec" # 鉴权失败缓存
  alluxio.worker.oci.registry.cache.binding.ttl: "10min" # Repo 绑定 + blob 元信息
  alluxio.worker.oci.registry.cache.tag.soft.ttl: "30sec" # Tag 软过期（到期后台刷新）
  alluxio.worker.oci.registry.cache.tag.hard.ttl: "5min" # Tag 硬过期（强制重拉）

user: 0
group: 0
fsGroup: 0

hostNetwork: true

prometheus:
  nodeSelector:
    alluxio.io/worker: enabled
  tolerations:
    - operator: Exists
  image: public.ecr.aws/m3q8r0k4/dodia/prometheus
  imageTag: v2.52.0

grafana:
  nodeSelector:
    alluxio.io/worker: enabled
  tolerations:
    - operator: Exists
  ports:
    web: 3000
    hostPort: 3000
  image: public.ecr.aws/m3q8r0k4/dodia/grafana
  imageTag: 11.1.0-ubuntu

etcd:
  nodeSelector:
    alluxio.io/worker: enabled
  tolerations:
    - operator: Exists
  replicaCount: 1
  image:
    registry: public.ecr.aws/m3q8r0k4
    repository: dodia/etcd
    tag: 3.5.9-debian-11-r24
  volumePermissions:
    image:
      registry: public.ecr.aws/m3q8r0k4
      repository: dodia/os-shell
      tag: 11-debian-11-r2
  persistence:
    enabled: true
    storageClass: managed-csi
    size: 50Gi

coordinator:
  nodeSelector:
    alluxio.io/worker: enabled
  tolerations:
    - operator: Exists
  metastore:
    hostPath: /mnt/alluxio/master/meta
  jvmOptions:
    - -Xmx16g
    - -Xms4g
    - -XX:MaxDirectMemorySize=8g
  resources:
    limits:
      cpu: "8"
      memory: "24Gi"
    requests:
      cpu: "2"
      memory: "4Gi"

worker:
  useExternalId: false
  systemInfo:
    type: hostPath
    hostPath: /mnt/alluxio/system-info
  log:
    type: hostPath
    hostPath: /mnt/alluxio/logs/worker
  metastore:
    type: hostPath
    hostPath: /mnt/alluxio/pagestore/meta

workerGroups:
  - worker:
      nodeSelector:
        alluxio.io/worker: enabled
      tolerations:
        - operator: Exists
      count: 2
      pagestore:
        hostPath: /mnt/alluxio/pagestore/data,/mnt/disk2/pagestore/data,/mnt/disk3/pagestore/data
        size: 350Gi,350Gi,350Gi
      jvmOptions:
        - -Xmx24g
        - -Xms8g
        - -XX:MaxDirectMemorySize=16g
      resources:
        limits:
          cpu: "10"
          memory: "42Gi"
        requests:
          cpu: "4"
          memory: "8Gi"

fuse:
  type: none

oci:
  image: public.ecr.aws/m3q8r0k4/dodia/alluxio-oci-proxy
  imageTag: v1.0
  nodeSelector:
    alluxio.io/oci: "enabled"
  upstreamRegistry: alluxio.azurecr.io
  containerdSetup:
    image: public.ecr.aws/m3q8r0k4/dodia/alluxio-containerd-action
    imageTag: v0.1
