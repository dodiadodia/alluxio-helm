{{- $masterCount := int .Values.master.count }}
{{- $isSingleMaster := eq $masterCount 1 }}
{{- $hostNetwork := .Values.master.hostNetwork }}
{{- $hostPID := .Values.master.hostPID }}
{{- $fullName := include "cacheonly.fullname" . }}
{{- $chart := include "cacheonly.chart" . }}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}-master
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: {{ $fullName }}-master
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: alluxio
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/component: {{ $fullName }}-master
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/part-of: alluxio
  serviceName: {{ $fullName }}-master
  podManagementPolicy: Parallel
  replicas: {{ $masterCount }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/component: {{ $fullName }}-master
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: alluxio
    {{- if .Values.master.podAnnotations }}
      annotations:
      {{- with .Values.master.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
    spec:
      {{ if .Values.hostAliases }}
      {{- include "cacheonly.hostAliases" . | nindent 6 }}
      {{ end }}
      hostNetwork: {{ $hostNetwork }}
      dnsPolicy: {{ .Values.master.dnsPolicy | default ($hostNetwork | ternary "ClusterFirstWithHostNet" "ClusterFirst") }}
      nodeSelector:
      {{- if .Values.master.nodeSelector }}
{{ toYaml .Values.master.nodeSelector | trim | indent 8  }}
      {{- else if .Values.nodeSelector }}
{{ toYaml .Values.nodeSelector | trim | indent 8  }}
      {{- end }}
      affinity:
      {{- if .Values.master.affinity }}
{{ toYaml .Values.master.affinity | trim | indent 8  }}
      {{- else if .Values.affinity }}
{{ toYaml .Values.affinity | trim | indent 8  }}
      {{- end }}
      tolerations:
      {{- if .Values.master.tolerations }}
{{ toYaml .Values.master.tolerations | trim | indent 8  }}
      {{- end }}
      {{- if .Values.tolerations }}
{{ toYaml .Values.tolerations | trim | indent 8  }}
      {{- end }}
      securityContext:
        runAsUser: {{ .Values.user }}
        runAsGroup: {{ .Values.group }}
        fsGroup: {{ .Values.fsGroup }}
    {{- if .Values.master.serviceAccount }}
      serviceAccountName: {{ .Values.master.serviceAccount }}
    {{- else if .Values.serviceAccount }}
      serviceAccountName: {{ .Values.serviceAccount }}
    {{- end }}
      {{- if .Values.imagePullSecrets }}
{{ include "cacheonly.imagePullSecrets" . | indent 6 }}
      {{- end}}
      initContainers:
      {{- if .Values.journal.format.runFormat}}
      - name: journal-format
        image: {{ .Values.image }}:{{ .Values.imageTag }}
        imagePullPolicy: {{ .Values.imagePullPolicy }}
        command: ["alluxio","formatJournal"]
        envFrom:
          - configMapRef:
              name: {{ $fullName }}-config
        volumeMounts:
          - name: cacheonly-journal
            mountPath: {{ .Values.journal.folder }}
      {{- end}}
      shareProcessNamespace: {{ .Values.master.shareProcessNamespace | default false }}
      containers:
        {{- if .Values.master.extraContainers }}
{{- include "cacheonly.extraContainers" (dict "extraContainers" .Values.master.extraContainers) | indent 8 }}
        {{- end }}
        - name: cacheonly-master
          image: {{ .Values.image }}:{{ .Values.imageTag }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          {{- if .Values.master.resources  }}
{{ include "cacheonly.master.resources" . | indent 10 }}
          {{- end }}
          command: ["tini", "--", "/entrypoint.sh"]
          {{- if .Values.master.args }}
          args:
{{ toYaml .Values.master.args | trim | indent 12 }}
          {{- end }}
          env:
          - name: ALLUXIO_GEMINI_MASTER_HOSTNAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name
          {{- range $key, $value := .Values.master.env }}
          - name: "{{ $key }}"
            value: "{{ $value }}"
          {{- end }}
          readinessProbe:
            tcpSocket:
              port: "embedded"
            initialDelaySeconds: {{ .Values.master.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.master.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.master.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.master.readinessProbe.failureThreshold }}
            successThreshold: {{ .Values.master.readinessProbe.successThreshold }}
          livenessProbe:
            tcpSocket:
              port: "embedded"
            initialDelaySeconds: {{ .Values.master.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.master.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.master.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.master.livenessProbe.failureThreshold }}
          {{- if .Values.master.startupProbe }}
          startupProbe:
            tcpSocket:
              port: "embedded"
            initialDelaySeconds: {{ .Values.master.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.master.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.master.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.master.startupProbe.failureThreshold }}
          {{- end}}
          ports:
          - containerPort: {{ .Values.master.ports.rpc }}
            name: rpc
          - containerPort: {{ .Values.master.ports.web }}
            name: web
          - containerPort: {{ .Values.master.ports.embedded }}
            name: embedded
          volumeMounts:
            {{- if .Values.master.extraVolumeMounts }}
{{- include "cacheonly.extraVolumeMounts" (dict "extraVolumeMounts" .Values.master.extraVolumeMounts) | indent 12 }}
            {{- end }}
            - name: {{ $fullName }}-config-volume
              mountPath: /opt/alluxio/conf
            - name: cacheonly-journal
              mountPath: {{ .Values.journal.folder }}
            {{- if .Values.metastore }}
            - name: cacheonly-metastore
              mountPath: {{ .Values.metastore.mountPath }}
            {{- end }}
            {{- if .Values.secrets }}
              {{- if .Values.secrets.master }}
{{- include "cacheonly.master.secretVolumeMounts" . }}
              {{- end }}
            {{- end }}
            {{- if .Values.license }}
{{- include "cacheonly.licenseVolumeMount" . }}
            {{- end }}
            {{- if .Values.configmaps }}
              {{- if .Values.configmaps.master }}
{{- include "cacheonly.master.configmapVolumeMounts" . }}
              {{- end }}
            {{- end }}
            {{- if .Values.mounts }}
{{- include "cacheonly.master.otherVolumeMounts" . }}
            {{- end }}
      restartPolicy: Always
      volumes:
        {{- if .Values.master.extraVolumes }}
{{- include "cacheonly.extraVolumes" (dict "extraVolumes" .Values.master.extraVolumes) | indent 8 }}
        {{- end }}
        - name: {{ $fullName }}-config-volume
          configMap:
            name: {{ $fullName }}-config
        {{- if .Values.secrets }}
          {{- if .Values.secrets.master }}
            {{- range $key, $val := .Values.secrets.master }}
        - name: secret-{{ $key }}-volume
          secret:
            secretName: {{ $key }}
            defaultMode: 256
            {{- end }}
          {{- end }}
        {{- end }}
        {{- if .Values.license }}
        - name: secret-cacheonly-license-volume
          secret:
            secretName: cacheonly-license
            defaultMode: 256
        {{- end }}
        {{- if .Values.mounts }}
          {{- range .Values.mounts }}
        - name: "{{ .name }}"
          persistentVolumeClaim:
            claimName: "{{ .name }}"
          {{- end }}
        {{- end }}
        {{- if .Values.metastore }}
          {{- if eq .Values.metastore.volumeType "emptyDir" }}
        - name: cacheonly-metastore
          emptyDir:
            medium: {{ .Values.metastore.medium }}
            sizeLimit: {{ .Values.metastore.size | quote }}
          {{- end }}
        {{- end}}
        {{- if eq .Values.journal.volumeType "emptyDir" }}
        - name: cacheonly-journal
          emptyDir:
            medium: {{ .Values.journal.medium }}
            sizeLimit: {{ .Values.journal.size | quote }}
        {{- end}}
  volumeClaimTemplates:
  {{- if eq .Values.journal.volumeType "persistentVolumeClaim" }}
    - metadata:
        name: cacheonly-journal
      spec:
        storageClassName: {{ .Values.journal.storageClass }}
        accessModes:
{{ toYaml .Values.journal.accessModes | indent 8 }}
        resources:
          requests:
            storage: {{ .Values.journal.size }}
  {{- end }}
  {{- if .Values.metastore }}
    {{- if eq .Values.metastore.volumeType "persistentVolumeClaim" }}
    - metadata:
        name: cacheonly-metastore
      spec:
        storageClassName: {{ .Values.metastore.storageClass }}
        accessModes:
{{ toYaml .Values.metastore.accessModes | indent 8 }}
        resources:
          requests:
            storage: {{ .Values.metastore.size }}
    {{- end }}
  {{- end }}
