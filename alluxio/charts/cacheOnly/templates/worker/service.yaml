{{- $release := .Release }}
{{- $name := include "cacheonly.name" . }}
{{- $fullName := include "cacheonly.fullname" . }}
{{- $chart := include "cacheonly.chart" . }}

apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-worker
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: {{ $fullName }}-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: alluxio
spec:
  ports:
    - port: {{ int .Values.worker.ports.rpc }}
      name: rpc
    - port: {{ int .Values.worker.ports.web }}
      name: web
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/component: {{ $fullName }}-worker
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: alluxio
