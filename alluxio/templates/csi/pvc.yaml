{{- if eq .Values.fuse.type "csi" -}}

{{- $fullName := include "common.fullname" . }}

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
{{- if not .Values.fuse.useLegacyCsiName }}
  name: {{ $fullName }}-fuse
{{- else }}
  name: {{ $fullName }}-alluxio-csi-fuse-pvc
{{- end }}
spec:
{{- if not .Values.fuse.useLegacyCsiName }}
  storageClassName: {{ .Release.Namespace }}-{{ $fullName }}-fuse
{{- else }}
  storageClassName: {{ $fullName }}-csi-storage-class
{{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Mi # The storage here is only for mount, so the size doesn't matter
{{- end }}
