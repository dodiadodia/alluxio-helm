{{- if eq .Values.fuse.type "csi" -}}

{{- $fullName := include "common.fullname" . }}

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
{{- if not .Values.fuse.useLegacyCsiName }}
  name: {{ .Release.Namespace }}-{{ $fullName }}-fuse
{{- else }}
  name: {{ $fullName }}-csi-storage-class
{{- end }}
provisioner: alluxio
volumeBindingMode: {{ .Values.fuse.csiVolumeBindingMode }}
parameters:
  alluxioClusterName: {{ $fullName }}
  alluxioClusterNamespace: {{ .Release.Namespace }}
{{- end }}
