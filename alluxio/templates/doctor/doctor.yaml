{{- $fullName := include "common.fullname" . }}
apiVersion: k8s-operator.alluxio.com/v1
kind: CollectInfo
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  scheduled:
    enabled: true
    cron: "0 0 * * *"
    timeZone: "UTC"
    expiration: 4320h
  type:
    - all
  logs:
    sinceSeconds: 86400
  metrics:
    duration: 24h
    step: 2h
  alluxioCluster:
    - name: {{ .Release.Name }}
      namespace: {{ .Release.Namespace }}
