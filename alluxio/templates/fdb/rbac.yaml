{{- if .Values.fdb.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "common.fullname" . }}-fdb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels" (dict "component" "fdb" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "common.fullname" . }}-fdb-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels" (dict "component" "fdb" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "common.fullname" . }}-fdb-role-binding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels" (dict "component" "fdb" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "common.fullname" . }}-fdb-role
subjects:
  - kind: ServiceAccount
    name: {{ include "common.fullname" . }}-fdb
    namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "common.fullname" . }}-fdb-cluster-role
  labels:
    {{- include "common.labels" (dict "component" "fdb" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
      - update
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "common.fullname" . }}-fdb-cluster-role-binding
  labels:
    {{- include "common.labels" (dict "component" "fdb" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "common.fullname" . }}-fdb-cluster-role
subjects:
  - kind: ServiceAccount
    name: {{ include "common.fullname" . }}-fdb
    namespace: {{ .Release.Namespace }}
{{- end }}
