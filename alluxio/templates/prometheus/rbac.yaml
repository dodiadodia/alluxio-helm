{{- $fullName := include "common.fullname" . }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $fullName }}-prometheus
  labels:
    {{- include "common.labels" (dict "component" "prometheus" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 6 }}
rules:
  - apiGroups: [""]
    resources:
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $fullName }}-prometheus
  labels:
    {{- include "common.labels" (dict "component" "prometheus" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 6 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $fullName }}-prometheus
  labels:
    {{- include "common.labels" (dict "component" "prometheus" "Release" .Release "Chart" .Chart "Values" .Values) | nindent 6 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $fullName }}-prometheus
subjects:
  - kind: ServiceAccount
    name: {{ $fullName }}-prometheus
