apiVersion: v1
data:
  alluxio.lua: |
    local ffi = require("ffi")

    ffi.cdef[[
        /* Opaque handle */
        typedef struct AlluxioClientHandle AlluxioClientHandle;

        typedef struct {
            const char *host;
            int http_port;
        } AlluxioWorkerAddr;

        typedef struct {
            AlluxioWorkerAddr *workers;
            int worker_count;
            size_t start_offset;
            size_t bytes;
            const char *error;
        } AlluxioReadResult;

        AlluxioClientHandle *alluxio_client_create(
            const char *etcd_urls,
            const char *cluster_name,
            int etcd_refresh_interval,
            int hash_nodes_per_worker,
            const char *etcd_username,
            const char *etcd_password,
            size_t segment_size,
            int ring_membership);

        void alluxio_client_destroy(AlluxioClientHandle *client);

        AlluxioReadResult *alluxio_get_worker_for_read(
            AlluxioClientHandle *client,
            const char *path,
            size_t offset,
            size_t bytes);

        void alluxio_free_read_result(AlluxioReadResult *result);

        const char *alluxio_last_error(void);

        /* Resolve an Alluxio mount path (e.g. "/s3/foo/bar.bin") to its UFS URI
        * (e.g. "s3://real-bucket/foo/bar.bin") using the mount table that the
        * client maintains in-memory by polling etcd every 10s. Returns a
        * heap-allocated C string the caller must free() with libc free(); NULL
        * on miss (no mount matches). NULL with non-empty alluxio_last_error()
        * indicates an error. */
        char *alluxio_resolve_ufs_path(
            AlluxioClientHandle *client,
            const char *alluxio_path);

        /* libc free for the heap string returned by alluxio_resolve_ufs_path. */
        void free(void *ptr);
    ]]

    local _M = {}
    _M._VERSION = "1.0.0"

    -- Ring membership modes, must match ALLUXIO_RING_MEMBERSHIP_* in alluxio_c_api.h
    _M.RING_MEMBERSHIP_DYNAMIC = 0  -- LIVE workers only (matches Java default)
    _M.RING_MEMBERSHIP_STATIC  = 1  -- LIVE + LOST (legacy C++ behavior)

    -- Module-level state: the shared library handle and client handle.
    -- In OpenResty, each worker process gets its own copy via init_worker_by_lua.
    local lib = nil
    local client = nil

    --- Load the shared library.
    -- @param lib_path  Path to liballuxio_client.so
    local function load_lib(lib_path)
        if lib then return end
        local ok, loaded = pcall(ffi.load, lib_path)
        if not ok then
            error("Failed to load liballuxio_client.so from " .. lib_path .. ": " .. tostring(loaded))
        end
        lib = loaded
    end

    --- Initialize the Alluxio client. Call this once from init_worker_by_lua.
    -- @param opts  Table with configuration:
    --   lib_path              string  Path to liballuxio_client.so
    --   etcd_urls             string  Comma-separated etcd endpoints
    --   cluster_name          string  Alluxio cluster name (default: "DefaultAlluxioCluster")
    --   etcd_refresh_interval number  Seconds between worker list refreshes (default: 120)
    --   hash_nodes_per_worker number  Virtual nodes per worker (default: 2000)
    --   etcd_username         string  etcd auth username (optional)
    --   etcd_password         string  etcd auth password (optional)
    --   segment_size          number  File segment size in bytes (0 to disable, default: 0)
    --   ring_membership       number  0=DYNAMIC (LIVE only, default, matches Java);
    --                                 1=STATIC (LIVE+LOST, legacy pre-0031f32)
    function _M.init(opts)
        opts = opts or {}

        local lib_path = opts.lib_path or "/usr/local/lib/liballuxio_client.so"
        load_lib(lib_path)

        if client ~= nil then
            return  -- already initialized
        end

        local etcd_urls = opts.etcd_urls or "localhost:2379"
        local cluster_name = opts.cluster_name or "DefaultAlluxioCluster"
        local refresh = opts.etcd_refresh_interval or 120
        local vnodes = opts.hash_nodes_per_worker or 2000
        local username = opts.etcd_username or ""
        local password = opts.etcd_password or ""
        local seg_size = opts.segment_size or 0
        local ring_membership = opts.ring_membership or _M.RING_MEMBERSHIP_DYNAMIC

        local handle = lib.alluxio_client_create(
            etcd_urls, cluster_name, refresh, vnodes, username, password,
            seg_size, ring_membership)
        if handle == nil then
            local err = lib.alluxio_last_error()
            local msg = err ~= nil and ffi.string(err) or "unknown error"
            error("Failed to initialize Alluxio client: " .. msg)
        end

        client = ffi.gc(handle, lib.alluxio_client_destroy)
    end

    --- Look up the target worker for a given file path and byte range.
    -- @param path    string  The S3/file path (e.g. "s3://bucket/key")
    -- @param offset  number  Starting byte offset (default: 0)
    -- @param bytes   number  Number of bytes (default: 0, meaning whole file)
    -- @return table  { host = "1.2.3.4", port = 28080 } on success
    -- @return nil, string  On error: nil plus an error message
    function _M.get_worker(path, offset, bytes)
        if not lib or not client then
            return nil, "Alluxio client not initialized (call alluxio.init() first)"
        end

        offset = offset or 0
        bytes = bytes or 0

        local result = lib.alluxio_get_worker_for_read(client, path, offset, bytes)
        if result == nil then
            return nil, "FFI call returned NULL"
        end

        -- Extract data from the C struct, then free it
        local worker_host, worker_port, err_msg

        local ok, extract_err = pcall(function()
            if result.error ~= nil then
                err_msg = ffi.string(result.error)
                return
            end
            if result.worker_count < 1 then
                err_msg = "No workers returned"
                return
            end
            local w = result.workers[0]
            worker_host = ffi.string(w.host)
            worker_port = w.http_port
        end)

        lib.alluxio_free_read_result(result)

        if not ok then
            return nil, "Error processing result: " .. tostring(extract_err)
        end
        if err_msg then
            return nil, err_msg
        end

        return { host = worker_host, port = worker_port }
    end

    --- Parse an HTTP Range header into (offset, bytes) tuple.
    -- Supports "bytes=START-END" and "bytes=START-" forms.
    -- @param range_header  string  e.g. "bytes=0-1023"
    -- @return offset, bytes  (both numbers; bytes=0 if open-ended)
    function _M.parse_range(range_header)
        if not range_header then
            return 0, 0
        end

        local start_str, end_str = range_header:match("bytes=(%d+)-(%d*)")
        if not start_str then
            return 0, 0
        end

        local start_offset = tonumber(start_str) or 0
        if end_str and end_str ~= "" then
            local end_offset = tonumber(end_str) or 0
            return start_offset, end_offset - start_offset + 1
        end

        return start_offset, 0
    end

    --- Build the S3/Alluxio path key from the request URI.
    -- The path used for consistent hashing should be the bucket + object key.
    -- @param uri  string  The request URI, e.g. "/bucket/path/to/object"
    -- @param bucket_in_host  string|nil  If using virtual-hosted-style, the bucket name
    -- @return string  The path for hashing, e.g. "s3://bucket/path/to/object"
    function _M.build_path_key(uri, bucket_in_host)
        if bucket_in_host and bucket_in_host ~= "" then
            return "s3://" .. bucket_in_host .. uri
        end
        -- Path-style: URI is /bucket/key...
        -- Strip leading slash for the s3:// construction
        local path = uri:match("^/(.+)") or uri
        return "s3://" .. path
    end

    --- Resolve an Alluxio mount path to its UFS URI via the in-process mount-table
    --  cache maintained by liballuxio_client.so (refreshed from etcd every 10s).
    -- @param alluxio_path  string  e.g. "/s3/foo/bar.bin"
    -- @return string|nil  The UFS path (e.g. "s3://real-bucket/foo/bar.bin"), or
    --                      nil when no mount matches (caller should fall back to
    --                      build_path_key for the legacy "s3://bucket/key" shape).
    -- @return nil, string  On C-level error: nil plus an error message.
    function _M.resolve_ufs_path(alluxio_path)
        if not lib or not client then
            return nil, "Alluxio client not initialized"
        end
        if not alluxio_path or alluxio_path == "" then
            return nil
        end
        local cstr = lib.alluxio_resolve_ufs_path(client, alluxio_path)
        if cstr == nil then
            -- Distinguish miss (last_error empty) from real error.
            local err = lib.alluxio_last_error()
            if err ~= nil then
                local msg = ffi.string(err)
                if msg ~= "" then
                    return nil, msg
                end
            end
            return nil  -- miss
        end
        local s = ffi.string(cstr)
        ffi.C.free(cstr)
        return s
    end

    return _M
  oci_proxy.lua: |

    local alluxio = require("alluxio")

    local _M = {}
    _M._VERSION = "1.0.0"

    -- -----------------------------------------------------------------------------
    -- Helpers
    -- -----------------------------------------------------------------------------

    --- Build the consistent-hash key for a manifest request.
    -- Per design §18 we want all manifest traffic for `<registry>/<repo>` (tag
    -- resolve, HEAD, GET, singleflight) to hash to the same Worker so the
    -- repo-scoped tag cache, manifest body cache, and (registry, repo, MANIFEST,
    -- digest) binding live in one place. Manifests are KB-sized and few per
    -- image, so co-locating them costs no meaningful storage.
    local function manifest_hash_key(registry, repo)
        return "oci://" .. registry .. "/" .. repo
    end

    --- Build the consistent-hash key for a blob request.
    -- Per design §18 blobs (config + layer) are hashed by digest, NOT by repo,
    -- so a single image's many layers naturally spread across the ring. This:
    --   * parallelises disk IO + egress bandwidth across Workers;
    --   * dedupes a popular base layer (e.g. alpine) to one physical copy
    --     cluster-wide, regardless of how many repos reference it;
    --   * keeps the AuthZ model intact — Worker still gates cache return on
    --     mRepoBindingCache((registry, repo, BLOB, digest)), which is repo-scoped
    --     and recomputed independently of routing (design §18.3).
    local function blob_hash_key(registry, digest)
        return "oci-blob://" .. registry .. "/" .. digest
    end

    --- Resolve a hostname to an IP, with a per-worker DNS cache. balancer_by_lua
    --  requires a numeric peer.
    local function resolve_host(host)
        if not host then return nil end
        if host:match("^%d+%.%d+%.%d+%.%d+$") then
            return host
        end
        local cached = _G.dns_cache and _G.dns_cache[host]
        if cached then return cached end

        local ok, resolver = pcall(require, "resty.dns.resolver")
        if not ok then
            return host
        end
        local r = resolver:new{
            nameservers = {"127.0.0.53"},
            retrans = 2,
            timeout = 1000,
        }
        if not r then return host end
        local answers, err = r:query(host, { qtype = r.TYPE_A })
        if answers and not answers.errcode and #answers > 0 then
            local ip = answers[1].address
            if _G.dns_cache then _G.dns_cache[host] = ip end
            return ip
        end
        return host
    end

    --- Parse a /v2/<name>/{manifests,blobs}/<reference> request URI.
    --  Returns (repo, object_type, reference) where object_type is "manifests"
    --  or "blobs", or nil when the URI is not a recognised registry data-plane
    --  path. <name> can contain slashes, e.g. "library/nginx" or "team/proj/svc".
    local function parse_v2_path(uri)
        -- Strip query string defensively.
        local path = uri:match("^([^?]*)") or uri
        -- Match the trailing "/manifests/<ref>" or "/blobs/<ref>" segment first
        -- and treat everything before it (after "/v2/") as the repo name.
        local repo, obj, ref = path:match("^/v2/(.+)/(manifests)/(.+)$")
        if repo then return repo, obj, ref end
        repo, obj, ref = path:match("^/v2/(.+)/(blobs)/(.+)$")
        if repo then return repo, obj, ref end
        -- Future: uploads are not part of the read-only mirror scope.
        return nil
    end

    -- -----------------------------------------------------------------------------
    -- /v2/ challenge handler
    -- -----------------------------------------------------------------------------

    --- Respond to GET/HEAD /v2/ with an ACR-style 401 challenge so containerd
    --  performs token acquisition directly against ACR (A1 Token Flow,
    --  design §7.2 / §8.2).
    function _M.handle_v2_root()
        local registry = _G.oci_upstream_registry or ""
        if registry == "" then
            ngx.status = 503
            ngx.header["Content-Type"] = "application/json"
            ngx.say('{"errors":[{"code":"UNAVAILABLE","message":"OCI_UPSTREAM_REGISTRY not configured"}]}')
            return
        end

        -- If the client already presents an Authorization header on /v2/ we
        -- treat that as "ping succeeded" — same shape ACR returns.
        if ngx.var.http_authorization and ngx.var.http_authorization ~= "" then
            ngx.status = 200
            ngx.header["Docker-Distribution-Api-Version"] = "registry/2.0"
            ngx.header["Content-Type"] = "application/json"
            if ngx.req.get_method() == "GET" then
                ngx.say("{}")
            end
            return
        end

        local realm = _G.oci_auth_realm
        if not realm or realm == "" then
            realm = "https://" .. registry .. "/oauth2/token"
        end

        ngx.status = 401
        ngx.header["Docker-Distribution-Api-Version"] = "registry/2.0"
        ngx.header["WWW-Authenticate"] = string.format(
            'Bearer realm="%s",service="%s"', realm, registry)
        ngx.header["Content-Type"] = "application/json"
        if ngx.req.get_method() == "GET" then
            ngx.say('{"errors":[{"code":"UNAUTHORIZED","message":"authentication required"}]}')
        end
    end

    -- -----------------------------------------------------------------------------
    -- Main routing entry point (called from access_by_lua_block in nginx.conf)
    -- -----------------------------------------------------------------------------

    function _M.route()
        local registry = _G.oci_upstream_registry or ""
        if registry == "" then
            ngx.log(ngx.ERR, "OCI_UPSTREAM_REGISTRY not configured")
            return ngx.exit(503)
        end

        local uri = ngx.var.uri
        local repo, obj_type, reference = parse_v2_path(uri)
        if not repo then
            ngx.log(ngx.WARN, "unrecognised /v2 path: ", uri)
            return ngx.exit(404)
        end

        -- Stash for access log + downstream visibility.
        ngx.req.set_header("X-Alluxio-Upstream-Registry", registry)
        ngx.req.set_header("X-Alluxio-Repo", repo)
        ngx.req.set_header("X-Alluxio-Object-Type", obj_type)

        -- Pick the consistent-hash key per design §18:
        --   * manifests (tag or digest) → key by <registry>/<repo>
        --     so tag-cache, manifest-cache, singleflight, and the per-repo
        --     MANIFEST binding all stay co-located on one Worker.
        --   * blobs (config or layer) → key by <registry>/<digest>
        --     so a single image's layers fan out across the ring and a popular
        --     base layer dedupes to one physical copy cluster-wide.
        -- Note: the routing key does NOT carry the repo for blobs, but the
        -- Worker's mRepoBindingCache is still keyed by (registry, repo, BLOB,
        -- digest) and the upstream HEAD probe still goes through /v2/<repo>/...,
        -- so cross-repo content theft is impossible (see §18.3).
        local is_digest_ref = reference and reference:sub(1, 7) == "sha256:"
        local key
        if obj_type == "blobs" and is_digest_ref then
            key = blob_hash_key(registry, reference)
        else
            -- Manifests (both tag and digest forms) and any pathological
            -- non-digest blob reference all stay on the repo-keyed Worker.
            key = manifest_hash_key(registry, repo)
        end
        -- Expose for access-log diagnostics (see nginx.conf log_format).
        ngx.req.set_header("X-Alluxio-Route-Key", key)
        local worker, err = alluxio.get_worker(key, 0, 0)
        if not worker then
            ngx.log(ngx.ERR, "Alluxio routing failed for ", key, ": ", err)
            return ngx.exit(ngx.HTTP_BAD_GATEWAY)
        end

        local host = resolve_host(worker.host)
        ngx.ctx.target_host = host
        ngx.ctx.target_port = _G.oci_worker_port

        -- Light-weight context for ngx.var lookups in log_format. We do not
        -- rewrite Authorization / Accept / Range — proxy_pass_request_headers
        -- on (set in nginx.conf) carries them through verbatim, which is the
        -- whole point of the mirror per design §6.4 / §10.2.
        if ngx.var.http_x_alluxio_repo == nil then
            -- $http_* is read-only at log time but populated from request headers
            -- after set_header above, so this is just defensive.
        end

        -- Annotate reference type for debugging (digest vs tag) without
        -- changing routing — Worker re-parses the path anyway.
        if is_digest_ref then
            ngx.req.set_header("X-Alluxio-Ref-Type", "digest")
        else
            ngx.req.set_header("X-Alluxio-Ref-Type", "tag")
        end
    end

    return _M

  nginx.conf: |
    worker_processes auto;
    worker_cpu_affinity auto;
    worker_rlimit_nofile 65536;
    error_log logs/error.log info;
    pid       logs/nginx.pid;

    events {
        worker_connections 16384;
    }

    # Environment variables consumed by oci_proxy.lua / alluxio.lua.
    env ALLUXIO_ETCD_URLS;
    env ALLUXIO_CLUSTER_NAME;
    env ALLUXIO_LIB_PATH;
    env ALLUXIO_ETCD_REFRESH_INTERVAL;
    env ALLUXIO_ETCD_USERNAME;
    env ALLUXIO_ETCD_PASSWORD;
    env ALLUXIO_RING_MEMBERSHIP;
    # Worker-side OCI service port (the Alluxio Worker OCI Service from the
    # v0.2 refined design). Each worker exposes a registry-compatible read
    # path on this port, including AuthZ + cache + ACR fetch.
    env ALLUXIO_WORKER_OCI_PORT;
    # Upstream ACR registry hostname this proxy fronts (e.g. myacr.azurecr.io).
    # The proxy is single-upstream per instance: containerd's hosts.toml maps
    # server = "https://myacr.azurecr.io" to this mirror, and we tell the
    # Worker which registry to AuthZ/fetch against via X-Alluxio-Upstream-Registry.
    env OCI_UPSTREAM_REGISTRY;
    # Optional: override the realm in the local /v2/ challenge response.
    # Default: https://<OCI_UPSTREAM_REGISTRY>/oauth2/token
    env OCI_AUTH_REALM;

    http {
        lua_package_path "$prefix/lua/?.lua;;";

        init_worker_by_lua_block {
            _G.oci_upstream_registry = os.getenv("OCI_UPSTREAM_REGISTRY") or ""
            -- The Alluxio Worker exposes its HTTP server on
            -- alluxio.worker.http.server.port (default 28080), handled by
            -- HttpServerHandler.java. The OCI registry mirror dispatch
            -- (/v2/...) lives on the same port — see
            -- HttpServerHandler.dispatch() routing for the "v2" prefix.
            _G.oci_worker_port       = tonumber(os.getenv("ALLUXIO_WORKER_OCI_PORT")) or 28080
            _G.oci_auth_realm        = os.getenv("OCI_AUTH_REALM") or ""
            _G.dns_cache             = {}

            if _G.oci_upstream_registry == "" then
                ngx.log(ngx.ERR,
                    "OCI_UPSTREAM_REGISTRY is not set; the proxy will reject /v2/ ",
                    "requests until it is configured (e.g. myacr.azurecr.io).")
            end

            local alluxio = require("alluxio")
            local ok, err = pcall(alluxio.init, {
                lib_path              = os.getenv("ALLUXIO_LIB_PATH") or "/usr/local/lib/liballuxio_client.so",
                etcd_urls             = os.getenv("ALLUXIO_ETCD_URLS") or "http://localhost:2379",
                cluster_name          = os.getenv("ALLUXIO_CLUSTER_NAME") or "DefaultAlluxioCluster",
                etcd_refresh_interval = tonumber(os.getenv("ALLUXIO_ETCD_REFRESH_INTERVAL")) or 120,
                etcd_username         = os.getenv("ALLUXIO_ETCD_USERNAME") or "",
                etcd_password         = os.getenv("ALLUXIO_ETCD_PASSWORD") or "",
                -- 0 = DYNAMIC (LIVE only) — matches Java default.
                ring_membership       = tonumber(os.getenv("ALLUXIO_RING_MEMBERSHIP")) or 0,
            })
            if not ok then
                ngx.log(ngx.ERR, "Failed to initialize Alluxio client: ", err)
            else
                ngx.log(ngx.NOTICE, "Alluxio OCI proxy initialized; upstream=",
                        _G.oci_upstream_registry, " worker_port=", _G.oci_worker_port)
            end
        }

        upstream alluxio_oci_workers {
            server 0.0.0.1;   # placeholder; balancer_by_lua picks the real peer
            balancer_by_lua_block {
                local balancer = require "ngx.balancer"
                local host = ngx.ctx.target_host
                local port = ngx.ctx.target_port
                if not host then
                    return ngx.exit(502)
                end
                local ok, err = balancer.set_current_peer(host, port)
                if not ok then
                    ngx.log(ngx.ERR, "balancer set_current_peer failed: ", err)
                    return ngx.exit(502)
                end
            }
            keepalive 1024;
            keepalive_timeout 60s;
            keepalive_requests 1000;
        }

        log_format ociproxy '$remote_addr - [$time_local] "$request" '
                            '$status $body_bytes_sent '
                            'repo=$http_x_alluxio_repo route_key=$http_x_alluxio_route_key '
                            'target=$upstream_addr '
                            'rt=$request_time urt=$upstream_response_time';
        access_log logs/access.log ociproxy;

        sendfile        on;
        tcp_nopush      on;
        tcp_nodelay     on;
        keepalive_timeout 65;
        resolver 127.0.0.53 ipv6=off;

        # OCI blob layers can be very large (multi-GiB). We do not buffer
        # request bodies (this proxy only serves GET/HEAD), so client_max_body_size
        # only matters defensively; set it generous in case of probes.
        client_max_body_size 0;

        server {
            listen 5000 reuseport;
            server_name _;

            # Health endpoint (proxy-local; not part of the registry protocol).
            location = /health {
                content_by_lua_block { ngx.say("OK") }
            }

            # Registry V2 API root: handle the unauthenticated probe locally so
            # containerd discovers the ACR auth realm and goes *directly* to ACR
            # for the bearer token (A1 Token Flow, design §7.2/§8.2).
            location = /v2/ {
                content_by_lua_block {
                    local oci = require("oci_proxy")
                    oci.handle_v2_root()
                }
            }
            location = /v2 {
                return 301 /v2/;
            }

            # All real registry traffic: /v2/<name>/manifests/<ref>
            # and /v2/<name>/blobs/<digest> (and uploads if ever added).
            location ~ ^/v2/ {
                access_by_lua_block {
                    local oci = require("oci_proxy")
                    oci.route()
                }

                proxy_pass http://alluxio_oci_workers;

                # Preserve original Host so downstream sees the registry name
                # the client used (containerd's mirror config sets this to
                # the mirror endpoint, e.g. 127.0.0.1:5000). The upstream
                # registry name is signalled separately via X-Alluxio-Upstream-Registry.
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

                # Pass everything else through verbatim — Authorization, Accept
                # (multi-value), Range, If-None-Match, If-Modified-Since.
                proxy_pass_request_headers on;

                # Stream both directions; manifests are small but blobs are huge.
                # Disable buffering so Range responses stream and the kernel
                # handles backpressure.
                proxy_buffering off;
                proxy_request_buffering off;

                # Resilience on stale keepalive connections.
                proxy_socket_keepalive on;
                proxy_next_upstream error timeout http_502 http_504;
                proxy_next_upstream_tries 3;
                proxy_next_upstream_timeout 10s;
                proxy_http_version 1.1;
                proxy_set_header Connection "";

                # Generous timeouts: cold pulls of large layers from ACR can
                # take a while on first miss (Worker streams ACR -> client).
                proxy_connect_timeout 10s;
                proxy_read_timeout 600s;
                proxy_send_timeout 600s;

                # Do NOT rewrite or buffer the response body. Worker is the
                # canonical owner of Content-Type / Docker-Content-Digest.
                proxy_pass_request_body on;
            }
        }
    }
kind: ConfigMap
metadata:
  name: alluxio-oci-proxy-config
  namespace: alluxio