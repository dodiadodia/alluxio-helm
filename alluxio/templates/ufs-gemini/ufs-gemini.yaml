{{- if .Values.cacheOnly.enabled }}
apiVersion: k8s-operator.alluxio.com/v1
kind: UnderFileSystem
metadata:
  name: {{ template "common.fullname" . }}-cacheonly-ufs
spec:
  alluxioCluster: {{ .Release.Name }}
  mountPath: {{ .Values.cacheOnly.mountPath }}
  path:
      {{- $count := int .Values.cacheOnly.master.count }}
      {{- $baseName := .Values.cacheOnly.fullnameOverride }}
      {{- if gt $count 1 }}
        {{- " gemini://" -}}
        {{- $port := .Values.cacheOnly.master.ports.embedded -}}
        {{- range $i := until $count -}}
          {{- printf "%s-master-%d:%v" $baseName $i $port -}}
          {{- if lt $i (sub $count 1) }},{{- end -}}
        {{- end -}}
      {{- else }}
        {{- printf " gemini://%v-master-0:%v" $baseName .Values.cacheOnly.master.ports.rpc }}
      {{- end }}
  mountOptions:
{{- end }}
