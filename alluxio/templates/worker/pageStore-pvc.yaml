{{- $fullName := include "common.fullname" . }}
{{- $reservedSize  := .Values.worker.pagestore.reservedSize -}}

{{- if and (ne .Values.worker.type "StatefulSet") (eq .Values.worker.pagestore.type "persistentVolumeClaim") }}
{{- $pvcName := include "alluxio.getPvcName" (dict "prefix" $fullName "component" "pagestore") }}
{{- range $i, $size := splitList "," .Values.worker.pagestore.size }}
  {{- $totalStorage := include "alluxio.calculateTotalStorage" (dict "size" $size "reservedSize" $reservedSize) }}
    {{- include "common.template.pvc" (dict
        "name" (printf "%s-%d" $pvcName $i)
        "size" $totalStorage
        "storageClass" $.Values.worker.pagestore.storageClass
        "accessModes" (list "ReadWriteOnce")
        "Values" $.Values
        "Chart" $.Chart
        "Release" $.Release) | nindent 0 }}
---
{{- end }}
{{- end }}
