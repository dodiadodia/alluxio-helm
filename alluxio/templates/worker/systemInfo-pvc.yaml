{{- $fullName := include "common.fullname" . }}

{{- if and (ne .Values.worker.type "StatefulSet") (eq .Values.worker.systemInfo.type "persistentVolumeClaim") }}
{{- $workerSysInfoPvcName := include "alluxio.getPvcName" (dict "prefix" $fullName "component" "worker-sysinfo") }}
{{- include "common.template.pvc" (dict
    "name" $workerSysInfoPvcName
    "size" .Values.worker.systemInfo.size
    "storageClass" .Values.worker.systemInfo.storageClass
    "accessModes" (list "ReadWriteMany")
    "Values" .Values
    "Chart" .Chart
    "Release" .Release) | nindent 0 }}
{{- end }}
